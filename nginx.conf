# Minimal nginx config for serving a static MPA/SPA with a /health endpoint.
# No customization needed for typical Astro/Vite MPA sites.
#
# For SPAs (single index.html with client-side routing), uncomment the
# `try_files` line marked SPA below.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health endpoint for container probes and uptime checks
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Cache static assets aggressively (they have content hashes)
        location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # MPA routing — serve files as-is, fall back to 404
        location / {
            try_files $uri $uri/ $uri.html =404;
            # SPA: comment the line above and uncomment the line below instead
            # try_files $uri $uri/ /index.html;
        }
    }
}
